<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>化学元素百词斩 Pro</title>
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --success-color: #00b894;
            --error-color: #ff7675;
            --bg-grad: linear-gradient(120deg, #f1f2f6 0%, #dfe4ea 100%);
            --card-shadow: 0 12px 32px rgba(31, 38, 135, 0.08);
            --text-main: #2f3542;
            --text-muted: #747d8c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-grad);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* 状态栏升级 */
        .status-bar {
            background-color: rgba(241, 242, 246, 0.7);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .mode-badge {
            font-weight: 600;
            color: #0984e3;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(9, 132, 227, 0.1);
            transition: all 0.3s ease;
        }

        .mode-badge.wrong-mode {
            color: #d63031;
            background: rgba(214, 48, 49, 0.1);
        }

        .stats-group {
            display: flex;
            gap: 12px;
            color: var(--text-main);
            font-weight: 500;
        }

        .wrong-count {
            color: #d63031;
            font-weight: bold;
        }

        /* 顶置进度条 */
        .progress-container {
            width: 100%;
            height: 4px;
            background: #eee;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--primary-grad);
            transition: width 0.3s ease;
        }

        /* 题目区域 */
        .quiz-area {
            padding: 45px 24px 35px 24px;
            text-align: center;
        }

        .quiz-type {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .quiz-question {
            font-size: 52px;
            font-weight: 800;
            color: var(--text-main);
            margin: 0;
            min-height: 75px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.02);
        }

        /* 选项区域 */
        .options-area {
            padding: 0 24px 24px 24px;
        }

        .option-btn {
            width: 100%;
            padding: 18px 20px;
            margin-bottom: 14px;
            border: 2px solid #f1f2f6;
            border-radius: 16px;
            background-color: #ffffff;
            font-size: 17px;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            outline: none;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0,0,0,0.01);
        }

        .option-btn:hover {
            border-color: #747d8c;
            background-color: #fafafa;
            transform: translateY(-1px);
        }

        .option-btn:active {
            transform: translateY(1px);
        }

        /* 动态反馈样式 */
        .option-btn.correct {
            background-color: #e8f8f5 !important;
            border-color: var(--success-color) !important;
            color: var(--success-color) !important;
            box-shadow: 0 4px 12px rgba(0, 184, 148, 0.15);
        }

        .option-btn.incorrect {
            background-color: #ffeaa7 !important;
            border-color: var(--error-color) !important;
            color: #d63031 !important;
            box-shadow: 0 4px 12px rgba(255, 118, 117, 0.15);
        }

        /* 底部操作区 */
        .footer {
            padding: 20px;
            text-align: center;
            background: rgba(241, 242, 246, 0.4);
            border-top: 1px solid rgba(0, 0, 0, 0.03);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .switch-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .switch-btn:hover:not(:disabled) {
            background: rgba(0,0,0,0.05);
            color: var(--text-main);
        }

        .switch-btn:disabled {
            color: #ced6e0;
            cursor: not-allowed;
        }

        .switch-btn.active-ready {
            color: #ff7675;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="status-bar">
        <span id="modeLabel" class="mode-badge">常规挑战</span>
        <div class="stats-group">
            <span id="remainLabel">进度: 0/20</span>
            <span>错题: <span id="wrongLabel" class="wrong-count">0</span></span>
        </div>
    </div>

    <div class="progress-container">
        <div id="progressBar" class="progress-bar"></div>
    </div>

    <div class="quiz-area">
        <div id="quizType" class="quiz-type">加载中</div>
        <h1 id="quizQuestion" class="quiz-question">--</h1>
    </div>

    <div class="options-area" id="optionsArea">
        <button class="option-btn" onclick="checkAnswer(0)">A</button>
        <button class="option-btn" onclick="checkAnswer(1)">B</button>
        <button class="option-btn" onclick="checkAnswer(2)">C</button>
        <button class="option-btn" onclick="checkAnswer(3)">D</button>
    </div>

    <div class="footer">
        <button id="switchBtn" class="switch-btn" onclick="toggleMode()" disabled>错题强化</button>
        <button id="resetBtn" class="switch-btn" onclick="restartChallenge()">换一批(20题)</button>
    </div>
</div>

// ==================== 2. 数据控制与状态 ====================
let globalDb = [];       // 130题大金库
let challengePool = [];  // 当前挑战的20题池
let wrongPool = [];      // 永久错题本
let currentPool = [];    // 当前正在刷的库（指向挑战池或错题本）

let currentMode = "常规挑战"; // "常规挑战" 或 "错题模式"
let currentQuestion = null;
let currentShuffledOptions = [];
let isLocking = false;
let totalInRound = 20;   // 本轮初始题数

// 音频上下文初始化
let audioCtx = null;
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

// 播放原生合成音效（免除外部文件依赖）
function playSound(type) {
    try {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'correct') {
            // 清脆的“叮”声：高频短促双音调切换
            osc.type = 'sine';
            osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); // D5
            osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.08); // A5
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        } else {
            // 沉闷的“咚”声：低频锯齿下降音调
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(180, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(90, audioCtx.currentTime + 0.25);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }
    } catch(e) {
        console.log("音频播放受浏览器策略限制，需交互触发");
    }
}

// 乱序辅助
function shuffleArray(arr) {
    return arr.sort(() => Math.random() - 0.5);
}

// 初始化数据库
function initData() {
    const lines = rawData.trim().split('\n');
    lines.forEach(line => {
        const parts = line.split('\t');
        if (parts.length === 7) {
            globalDb.push({
                id: parts[0].trim(),
                type: parts[1].trim(),
                question: parts[2].trim(),
                answer: parts[3].trim(),
                options: [parts[3].trim(), parts[4].trim(), parts[5].trim(), parts[6].trim()]
            });
        }
    });
}

// 抽取新的一组挑战（20道题）
function restartChallenge() {
    shuffleArray(globalDb);
    challengePool = globalDb.slice(0, 20); // 每次精准抽20题
    totalInRound = 20;
    currentMode = "常规挑战";
    currentPool = challengePool;
    nextQuestion();
}

// ==================== 3. 游戏核心逻辑 ====================

function nextQuestion() {
    isLocking = false;
    updateStatusBar();

    if (currentPool.length === 0) {
        if (currentMode === "常规挑战") {
            alert("🎉 啪啪啪！本轮20道题全部消灭！");
            restartChallenge();
        } else {
            alert("✨ 赞！错题本已被全部清空，为你切回常规挑战！");
            restartChallenge();
        }
        return;
    }

    // 随机抽题
    const randomIndex = Math.floor(Math.random() * currentPool.length);
    currentQuestion = currentPool[randomIndex];

    document.getElementById('quizType').innerText = `【${currentQuestion.type}】`;
    document.getElementById('quizQuestion').innerText = currentQuestion.question;

    currentShuffledOptions = shuffleArray([...currentQuestion.options]);

    const buttons = document.querySelectorAll('.option-btn');
    buttons.forEach((btn, index) => {
        btn.innerText = currentShuffledOptions[index];
        btn.className = 'option-btn';
    });
}

function checkAnswer(selectedIndex) {
    if (isLocking) return;
    isLocking = true;

    // 用户首次点击时激活/恢复音频上下文
    if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
    }

    const selectedText = currentShuffledOptions[selectedIndex];
    const correctAnswer = currentQuestion.answer;
    const buttons = document.querySelectorAll('.option-btn');

    if (selectedText === correctAnswer) {
        playSound('correct');
        buttons[selectedIndex].classList.add('correct');

        // 从当前池移除
        if (currentMode === "常规挑战") {
            challengePool = challengePool.filter(q => q.id !== currentQuestion.id);
            currentPool = challengePool;
        } else {
            wrongPool = wrongPool.filter(q => q.id !== currentQuestion.id);
            currentPool = wrongPool;
        }
        setTimeout(nextQuestion, 400);
    } else {
        playSound('error');
        buttons[selectedIndex].classList.add('incorrect');
        buttons.forEach((btn, index) => {
            if (currentShuffledOptions[index] === correctAnswer) {
                btn.classList.add('correct');
            }
        });

        // 加入错题本（去重）
        if (!wrongPool.some(q => q.id === currentQuestion.id)) {
            wrongPool.push(currentQuestion);
        }
        setTimeout(nextQuestion, 1400);
    }
}

function updateStatusBar() {
    const modeLabel = document.getElementById('modeLabel');
    const switchBtn = document.getElementById('switchBtn');
    const progressBar = document.getElementById('progressBar');

    modeLabel.innerText = currentMode;
    if (currentMode === "错题模式") {
        modeLabel.className = "mode-badge wrong-mode";
        switchBtn.innerText = "退出错题";
        document.getElementById('remainLabel').innerText = `剩余错题: ${currentPool.length} 题`;
        progressBar.style.width = "100%";
    } else {
        modeLabel.className = "mode-badge";
        switchBtn.innerText = "错题强化";
        const solved = totalInRound - currentPool.length;
        document.getElementById('remainLabel').innerText = `进度: ${solved}/${totalInRound}`;
        const pct = (solved / totalInRound) * 100;
        progressBar.style.width = `${pct}%`;
    }

    document.getElementById('wrongLabel').innerText = wrongPool.length;

    if (wrongPool.length > 0) {
        switchBtn.disabled = false;
        switchBtn.classList.add('active-ready');
    } else {
        switchBtn.disabled = (currentMode === "常规挑战");
        switchBtn.classList.remove('active-ready');
    }
}

function toggleMode() {
    if (currentMode === "常规挑战") {
        if (wrongPool.length === 0) return;
        currentMode = "错题模式";
        currentPool = wrongPool;
        totalInRound = wrongPool.length;
        nextQuestion();
    } else {
        currentMode = "常规挑战";
        currentPool = challengePool;
        totalInRound = challengePool.length + (20 - challengePool.length); // 维持原有大数
        nextQuestion();
    }
}

window.onload = () => {
    initData();
    restartChallenge();
};
</script>

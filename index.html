<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>化学元素百词斩 Ultra</title>
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --success-color: #00b894;
            --error-color: #ff7675;
            --bg-grad: linear-gradient(120deg, #e0e5ec 0%, #f1f2f6 100%);
            --card-shadow: 0 12px 32px rgba(31, 38, 135, 0.06);
            --text-main: #2f3542;
            --text-muted: #747d8c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-grad);
            margin: 0;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 440px;
            height: 640px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.6);
            position: relative;
        }

        /* 顶部导航状态栏 */
        .status-bar {
            background-color: rgba(241, 242, 246, 0.7);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .mode-badge {
            font-weight: 600;
            color: #0984e3;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(9, 132, 227, 0.1);
        }
        .mode-badge.wrong-mode {
            color: #d63031;
            background: rgba(214, 48, 49, 0.1);
        }

        .progress-container { width: 100%; height: 4px; background: #eee; }
        .progress-bar { width: 0%; height: 100%; background: var(--primary-grad); transition: width 0.3s; }

        /* 页面主体内容区 */
        .content-page {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: none;
        }
        .content-page.active { display: block; }

        /* 1. 刷题页面样式 */
        .quiz-area { padding: 30px 10px 20px 10px; text-align: center; }
        .quiz-type { font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 2px; margin-bottom: 10px; }
        .quiz-question { font-size: 46px; font-weight: 800; color: var(--text-main); margin: 0; min-height: 65px; }
        .option-btn {
            width: 100%; padding: 15px 20px; margin-bottom: 12px; border: 2px solid #f1f2f6;
            border-radius: 16px; background: white; font-size: 16px; color: var(--text-main);
            cursor: pointer; transition: all 0.2s; font-weight: 600; text-align: center; outline: none;
        }
        .option-btn.correct { background-color: #e8f8f5 !important; border-color: var(--success-color) !important; color: var(--success-color) !important; }
        .option-btn.incorrect { background-color: #ffeaa7 !important; border-color: var(--error-color) !important; color: #d63031 !important; }

        .quiz-footer { display: flex; justify-content: space-around; padding-top: 10px; }
        .action-link { background: none; border: none; color: var(--text-muted); font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: underline; }
        .action-link.active-ready { color: var(--error-color); }

        /* 2. 查询页面样式 */
        .search-container { position: sticky; top: 0; background: rgba(255,255,255,0.95); padding-bottom: 10px; z-index: 5; }
        .search-box {
            width: 100%; padding: 12px; border: 2px solid #e4e7ed; border-radius: 12px;
            font-size: 15px; box-sizing: border-box; outline: none; transition: all 0.3s;
        }
        .search-box:focus { border-color: #4facfe; }
        .search-count { font-size: 12px; color: var(--text-muted); margin: 8px 0; font-weight: 600; }
        .dict-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
        .dict-item {
            background: white; padding: 12px 16px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid #f1f2f6;
        }
        .dict-q { font-weight: 700; color: var(--text-main); font-size: 16px; }
        .dict-a { font-weight: 600; color: var(--success-color); background: rgba(0, 184, 148, 0.1); padding: 2px 8px; border-radius: 6px; font-size: 14px; }

        /* 3. 打卡页面样式 */
        .punch-card {
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
            border-radius: 20px; padding: 24px; color: white; text-align: center; margin-bottom: 25px;
        }
        .punch-days { font-size: 42px; font-weight: 800; margin: 10px 0; }
        .punch-btn {
            background: white; color: #0984e3; border: none; padding: 12px 30px;
            border-radius: 25px; font-size: 16px; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); transition: all 0.2s;
        }
        .punch-btn:disabled { background: #ced6e0; color: #a4b0be; cursor: not-allowed; box-shadow: none; }

        .grid-title { font-size: 14px; color: var(--text-main); font-weight: 700; margin-bottom: 10px; }
        .punch-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .grid-day {
            aspect-ratio: 1; background: white; border-radius: 8px; border: 1px solid #e4e7ed;
            display: flex; justify-content: center; align-items: center; font-size: 11px; font-weight: 600; color: var(--text-muted);
        }
        .grid-day.active { background: var(--success-color); color: white; border-color: var(--success-color); }

        /* 底部仿 App 导航栏 */
        .bottom-nav {
            height: 65px; background: white; border-top: 1px solid rgba(0, 0, 0, 0.06);
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-muted); cursor: pointer; font-size: 12px; font-weight: 600; flex-grow: 1; height: 100%;
        }
        .nav-item.active { color: #0984e3; }
        .nav-icon { font-size: 20px; margin-bottom: 2px; }
    </style>
</head>

// ==================== 2. 全局状态控制 ====================
let globalDb = [];
let challengePool = [];
let wrongPool = [];
let currentPool = [];
let currentMode = "常规挑战";
let currentQuestion = null;
let currentShuffledOptions = [];
let isLocking = false;
let totalInRound = 20;

let audioCtx = null;

function tryInitAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function playSound(type) {
    try {
        tryInitAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'correct') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(587.33, audioCtx.currentTime);
            osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(170, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.25);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }
    } catch(e){}
}

function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

// ==================== 3. 核心初始化 ====================
function initData() {
    const lines = rawData.trim().split('\n');
    lines.forEach(line => {
        const parts = line.split('\t');
        if (parts.length === 7) {
            globalDb.push({
                id: parts[0].trim(), type: parts[1].trim(),
                question: parts[2].trim(), answer: parts[3].trim(),
                options: [parts[3].trim(), parts[4].trim(), parts[5].trim(), parts[6].trim()]
            });
        }
    });
}

function restartChallenge() {
    shuffle(globalDb);
    challengePool = globalDb.slice(0, 20);
    totalInRound = 20;
    currentMode = "常规挑战";
    currentPool = challengePool;
    nextQuestion();
}

function nextQuestion() {
    isLocking = false;
    updateStatusBar();

    if (currentPool.length === 0) {
        if (currentMode === "常规挑战") {
            alert("🎉 太强了！本轮20道题全对通关！可以去打卡成就页签到了哦~");
            restartChallenge();
        } else {
            alert("✨ 赞！错题本消灭完毕，切回常规挑战。");
            restartChallenge();
        }
        return;
    }

    const randomIndex = Math.floor(Math.random() * currentPool.length);
    currentQuestion = currentPool[randomIndex];

    document.getElementById('quizType').innerText = `【${currentQuestion.type}】`;
    document.getElementById('quizQuestion').innerText = currentQuestion.question;
    currentShuffledOptions = shuffle([...currentQuestion.options]);

    const buttons = document.querySelectorAll('.option-btn');
    buttons.forEach((btn, index) => {
        btn.innerText = currentShuffledOptions[index];
        btn.className = 'option-btn';
    });
}

function checkAnswer(selectedIndex) {
    if (isLocking) return;
    isLocking = true;
    tryInitAudio();

    const selectedText = currentShuffledOptions[selectedIndex];
    const correctAnswer = currentQuestion.answer;
    const buttons = document.querySelectorAll('.option-btn');

    if (selectedText === correctAnswer) {
        playSound('correct');
        buttons[selectedIndex].classList.add('correct');

        if (currentMode === "常规挑战") {
            challengePool = challengePool.filter(q => q.id !== currentQuestion.id);
            currentPool = challengePool;
        } else {
            wrongPool = wrongPool.filter(q => q.id !== currentQuestion.id);
            currentPool = wrongPool;
        }
        setTimeout(nextQuestion, 400);
    } else {
        playSound('error');
        buttons[selectedIndex].classList.add('incorrect');
        buttons.forEach((btn, index) => {
            if (currentShuffledOptions[index] === correctAnswer) btn.classList.add('correct');
        });

        if (!wrongPool.some(q => q.id === currentQuestion.id)) {
            wrongPool.push(currentQuestion);
        }
        setTimeout(nextQuestion, 1400);
    }
}

function updateStatusBar() {
    const modeLabel = document.getElementById('modeLabel');
    const switchBtn = document.getElementById('switchBtn');
    const progressBar = document.getElementById('progressBar');

    modeLabel.innerText = currentMode;
    if (currentMode === "错题模式") {
        modeLabel.className = "mode-badge wrong-mode";
        switchBtn.innerText = "退出错题";
        document.getElementById('remainLabel').innerText = `剩余: ${currentPool.length} 题`;
        progressBar.style.width = "100%";
    } else {
        modeLabel.className = "mode-badge";
        switchBtn.innerText = "错题强化";
        const solved = totalInRound - currentPool.length;
        document.getElementById('remainLabel').innerText = `进度: ${solved}/${totalInRound}`;
        progressBar.style.width = `${(solved / totalInRound) * 100}%`;
    }

    document.getElementById('wrongLabel').innerText = wrongPool.length;
    if (wrongPool.length > 0) {
        switchBtn.disabled = false;
        switchBtn.classList.add('active-ready');
    } else {
        switchBtn.disabled = (currentMode === "常规挑战");
        switchBtn.classList.remove('active-ready');
    }
}

function toggleMode() {
    if (currentMode === "常规挑战") {
        if (wrongPool.length === 0) return;
        currentMode = "错题模式"; currentPool = wrongPool; totalInRound = wrongPool.length; nextQuestion();
    } else {
        currentMode = "常规挑战"; currentPool = challengePool; totalInRound = 20; nextQuestion();
    }
}

// ==================== 4. 仿 App 选项卡切换 ====================
function switchTab(tabName) {
    tryInitAudio();
    document.querySelectorAll('.content-page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

    if (tabName === 'quiz') {
        document.getElementById('pageQuiz').classList.add('active');
        document.getElementById('btnNavQuiz').classList.add('active');
    } else if (tabName === 'search') {
        document.getElementById('pageSearch').classList.add('active');
        document.getElementById('btnNavSearch').classList.add('active');
        doSearch();
    } else if (tabName === 'rank') {
        document.getElementById('pageRank').classList.add('active');
        document.getElementById('btnNavRank').classList.add('active');
        renderPunchGrid();
    }
}

// ==================== 5. 题库字典查询系统（解除40条限制，完美满载） ====================
function doSearch() {
    const kw = document.getElementById('searchInp').value.toLowerCase().trim();
    const listContainer = document.getElementById('dictList');
    listContainer.innerHTML = '';

    let count = 0;
    // 直接循环展示完整的全量原始题库数据
    globalDb.forEach(item => {
        if (kw === "" || item.question.toLowerCase().includes(kw) || item.answer.toLowerCase().includes(kw)) {
            const div = document.createElement('div');
            div.className = 'dict-item';
            div.innerHTML = `<span class="dict-q"><span style="font-size:11px;color:#747d8c;font-weight:400;background:#eee;padding:2px 6px;border-radius:4px;margin-right:6px;">#${item.id}</span><span style="font-size:12px;color:#747d8c;font-weight:400;">${item.type}</span> <strong>${item.question}</strong></span> <span class="dict-a">正解: ${item.answer}</span>`;
            listContainer.appendChild(div);
            count++;
        }
    });

    // 动态显示当前搜出来/展示的总数
    if (kw === "") {
        document.getElementById('searchCount').innerText = `📊 全量题库共收录：${count} 道题（已全部加载完毕）`;
    } else {
        document.getElementById('searchCount').innerText = `🔍 帮您找到了：${count} 条匹配的题目`;
    }

    if(count === 0) {
        listContainer.innerHTML = '<div style="text-align:center;color:#a4b0be;margin-top:20px;font-size:14px;">没有搜到匹配的元素记录数据哦~</div>';
    }
}

// ==================== 6. 周期性持久化打卡系统 ====================
function getTodayString() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function renderPunchGrid() {
    const history = JSON.parse(localStorage.getItem('chem_punch_history') || '[]');
    const streak = parseInt(localStorage.getItem('chem_punch_streak') || '0');
    const lastDate = localStorage.getItem('chem_punch_last_date') || '';

    document.getElementById('streakText').innerText = `${streak} 天`;

    const today = getTodayString();
    document.getElementById('punchBtn').disabled = (lastDate === today);
    if (lastDate === today) document.getElementById('punchBtn').innerText = '今日已打卡';
    else document.getElementById('punchBtn').innerText = '今日打卡';

    const grid = document.getElementById('punchGrid');
    grid.innerHTML = '';

    for (let i = 1; i <= 28; i++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'grid-day';
        dayDiv.innerText = `${i}天`;

        if (i <= streak) {
            dayDiv.classList.add('active');
            dayDiv.innerText = '⭐';
        }
        grid.appendChild(dayDiv);
    }
}

function executePunch() {
    tryInitAudio();
    const today = getTodayString();
    let streak = parseInt(localStorage.getItem('chem_punch_streak') || '0');
    const lastDate = localStorage.getItem('chem_punch_last_date') || '';

    if (lastDate === today) return;

    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yestStr = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;

    if (lastDate === yestStr || streak === 0) {
        streak += 1;
        if(streak > 28) streak = 1;
    } else {
        streak = 1;
    }

    localStorage.setItem('chem_punch_streak', streak);
    localStorage.setItem('chem_punch_last_date', today);

    alert("🎉 打卡成功！成就星海已点亮，继续坚持哦！");
    renderPunchGrid();
}

// ==================== 7. 页面载入入口 ====================
window.onload = () => {
    initData();
    restartChallenge();
    document.body.addEventListener('click', () => { tryInitAudio(); }, { once: false });
};

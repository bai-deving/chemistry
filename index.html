<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>化学元素百词斩</title>
    <style>
        :root {
            --primary-color: #2196F3;
            --success-color: #4CAF50;
            --error-color: #F44336;
            --bg-color: #f5f7fa;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 状态栏 */
        .status-bar {
            background-color: #eef2f7;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            border-bottom: 1px solid #e2e8f0;
        }

        .mode-badge {
            font-weight: bold;
            color: var(--primary-color);
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(33, 150, 243, 0.1);
        }

        .mode-badge.wrong-mode {
            color: var(--error-color);
            background: rgba(244, 67, 54, 0.1);
        }

        .wrong-count {
            color: var(--error-color);
            font-weight: bold;
        }

        /* 题目区域 */
        .quiz-area {
            padding: 40px 20px;
            text-align: center;
            flex-grow: 1;
        }

        .quiz-type {
            font-size: 14px;
            color: #718096;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .quiz-question {
            font-size: 48px;
            font-weight: 700;
            color: #1a202c;
            margin: 0;
            min-height: 70px;
        }

        /* 选项区域 */
        .options-area {
            padding: 0 20px 20px 20px;
        }

        .option-btn {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background-color: white;
            font-size: 18px;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            outline: none;
            font-weight: 500;
        }

        .option-btn:active {
            transform: scale(0.98);
        }

        /* 反馈样式 */
        .option-btn.correct {
            background-color: #e6f4ea !important;
            border-color: var(--success-color) !important;
            color: var(--success-color) !important;
        }

        .option-btn.incorrect {
            background-color: #fce8e6 !important;
            border-color: var(--error-color) !important;
            color: var(--error-color) !important;
        }

        /* 底部切换按钮 */
        .footer {
            padding: 15px;
            text-align: center;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
        }

        .switch-btn {
            background: none;
            border: none;
            color: #718096;
            font-size: 14px;
            cursor: pointer;
            text-decoration: underline;
            padding: 5px 10px;
        }

        .switch-btn:disabled {
            color: #cbd5e1;
            cursor: not-allowed;
            text-decoration: none;
        }
        
        .switch-btn.active-ready {
            color: var(--error-color);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="status-bar">
        <span id="modeLabel" class="mode-badge">常规模式</span>
        <span id="remainLabel">剩余: 0 题</span>
        <span>错题本: <span id="wrongLabel" class="wrong-count">0</span> 题</span>
    </div>

    <div class="quiz-area">
        <div id="quizType" class="quiz-type">【题型加载中】</div>
        <h1 id="quizQuestion" class="quiz-question">--</h1>
    </div>

    <div class="options-area" id="optionsArea">
        <button class="option-btn" onclick="checkAnswer(0)">选项 A</button>
        <button class="option-btn" onclick="checkAnswer(1)">选项 B</button>
        <button class="option-btn" onclick="checkAnswer(2)">选项 C</button>
        <button class="option-btn" onclick="checkAnswer(3)">选项 D</button>
    </div>

    <div class="footer">
        <button id="switchBtn" class="switch-btn" onclick="toggleMode()" disabled>进入错题强化模式</button>
    </div>
</div>

// ==================== 2. 解析数据 ====================
let normalPool = [];
let wrongPool = [];
let currentPool = [];
let currentMode = "常规模式"; // "常规模式" 或 "错题模式"
let currentQuestion = null;
let currentShuffledOptions = [];
let isLocking = false; // 防止连点

// 初始化解析
function initData() {
    const lines = rawData.trim().split('\n');
    lines.forEach(line => {
        const parts = line.split('\t');
        if (parts.length === 7) {
            normalPool.push({
                id: parts[0],
                type: parts[1],
                question: parts[2],
                answer: parts[3],
                options: [parts[3], parts[4], parts[5], parts[6]]
            });
        }
    });
    currentPool = normalPool;
}

// ==================== 3. 核心游戏逻辑 ====================

// 打乱数组辅助函数
function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

// 加载下一题
function nextQuestion() {
    isLocking = false;
    updateStatusBar();

    // 检查库是否空了
    if (currentPool.length === 0) {
        if (currentMode === "常规模式") {
            alert("太棒了！常规题全部消灭完毕！去错题本看看吧~");
            if (wrongPool.length > 0) {
                switchToWrong();
            }
        } else {
            alert("恭喜！错题已被全部清空！为你切回常规模式。");
            switchToNormal();
        }
        return;
    }

    // 随机抽题
    const randomIndex = Math.floor(Math.random() * currentPool.length);
    currentQuestion = currentPool[randomIndex];

    // 渲染题干
    document.getElementById('quizType').innerText = `【${currentQuestion.type}】`;
    document.getElementById('quizQuestion').innerText = currentQuestion.question;

    // 乱序选项
    currentShuffledOptions = shuffle([...currentQuestion.options]);

    // 渲染按钮
    const buttons = document.querySelectorAll('.option-btn');
    buttons.forEach((btn, index) => {
        btn.innerText = currentShuffledOptions[index];
        btn.className = 'option-btn'; // 重置颜色样式
    });
}

// 检查答案
function checkAnswer(selectedIndex) {
    if (isLocking) return;
    isLocking = true;

    const selectedText = currentShuffledOptions[selectedIndex];
    const correctAnswer = currentQuestion.answer;
    const buttons = document.querySelectorAll('.option-btn');

    if (selectedText === correctAnswer) {
        // 答对：变绿
        buttons[selectedIndex].classList.add('correct');

        // 从当前库中“斩”掉
        if (currentMode === "常规模式") {
            normalPool = normalPool.filter(q => q.id !== currentQuestion.id);
            currentPool = normalPool;
        } else {
            wrongPool = wrongPool.filter(q => q.id !== currentQuestion.id);
            currentPool = wrongPool;
        }

        // 400毫秒快速进下一题
        setTimeout(nextQuestion, 400);
    } else {
        // 答错：自己变红，正确的变绿
        buttons[selectedIndex].classList.add('incorrect');
        buttons.forEach((btn, index) => {
            if (currentShuffledOptions[index] === correctAnswer) {
                btn.classList.add('correct');
            }
        });

        // 记录到错题本（去重）
        if (!wrongPool.some(q => q.id === currentQuestion.id)) {
            wrongPool.push(currentQuestion);
        }

        // 留出1.2秒记忆时间再切题
        setTimeout(nextQuestion, 1200);
    }
}

// 更新状态栏数字
function updateStatusBar() {
    const modeLabel = document.getElementById('modeLabel');
    const switchBtn = document.getElementById('switchBtn');

    modeLabel.innerText = currentMode;
    if (currentMode === "错题模式") {
        modeLabel.className = "mode-badge wrong-mode";
        switchBtn.innerText = "返回常规刷题模式";
    } else {
        modeLabel.className = "mode-badge";
        switchBtn.innerText = "进入错题强化模式";
    }

    document.getElementById('remainLabel').innerText = `剩余: ${currentPool.length} 题`;
    document.getElementById('wrongLabel').innerText = wrongPool.length;

    // 错题本有无数据的按钮控制
    if (wrongPool.length > 0) {
        switchBtn.disabled = false;
        switchBtn.classList.add('active-ready');
    } else {
        switchBtn.disabled = (currentMode === "常规模式");
        switchBtn.classList.remove('active-ready');
    }
}

// 切换模式按钮
function toggleMode() {
    if (currentMode === "常规模式") {
        switchToWrong();
    } else {
        switchToNormal();
    }
}

function switchToWrong() {
    if (wrongPool.length === 0) return;
    currentMode = "错题模式";
    currentPool = wrongPool;
    nextQuestion();
}

function switchToNormal() {
    currentMode = "常规模式";
    currentPool = normalPool;
    nextQuestion();
}

// 启动
window.onload = () => {
    initData();
    nextQuestion();
};
</script>
